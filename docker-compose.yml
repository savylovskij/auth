name: auth

services:
  postgres:
    image: postgres:17-alpine
    container_name: auth-postgres
    restart: unless-stopped
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-auth}
      POSTGRES_USER: ${POSTGRES_USER:-auth}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-auth}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-auth} -d ${POSTGRES_DB:-auth}']
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: auth-mailpit
    restart: unless-stopped
    ports:
      - '${MAIL_PORT:-1025}:1025'
      - '${MAILPIT_UI_PORT:-8025}:8025'

volumes:
  postgres-data:
